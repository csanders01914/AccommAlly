# AccessAlly - Docker Compose for Local Development
# Run: docker-compose up -d

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: accessally_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: accessally
      POSTGRES_PASSWORD: accessally_password
      POSTGRES_DB: accessally_db
    ports:
      - "5432:5432"
    volumes:
      - accessally_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accessally -d accessally_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  accessally_postgres_data:
    name: accessally_postgres_data
